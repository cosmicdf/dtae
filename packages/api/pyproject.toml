[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "dtae-api"
version = "0.1.0"
description = "DTAE REST API server"
requires-python = ">=3.11"
authors = [{ name = "cosmicdf", email = "cosmicdf@users.noreply.github.com" }]
license = { text = "Apache-2.0" }
dependencies = [
  "fastapi>=0.111",
  "uvicorn[standard]>=0.30",
  "dtae-core>=0.1.0",
  "qdrant-client>=1.9",
  "fastembed>=0.3",
  "pydantic>=2.7",
  "pydantic-settings>=2.3",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.0",
  "pytest-asyncio>=0.23",
  "httpx>=0.27",
  "ruff>=0.4",
  "mypy>=1.10",
]

[tool.hatch.build.targets.wheel]
packages = ["app"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
