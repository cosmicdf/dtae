[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "dtae-core"
version = "0.1.0"
description = "Dynamic Tool Assembly Engine — give your agent the right tools at the right time"
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.11"
authors = [{ name = "cosmicdf", email = "mkrmh74@gmail.com" }]
keywords = ["ai", "agents", "llm", "tools", "mcp", "context"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: Apache Software License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Topic :: Software Development :: Libraries",
]
dependencies = [
  "networkx>=3.3",
  "pydantic>=2.7",
  "httpx>=0.27",
]

[project.optional-dependencies]
embeddings = ["fastembed>=0.3.0"]
storage = ["qdrant-client>=1.9.0"]
langgraph = ["langgraph>=0.1"]
anthropic = ["anthropic>=0.28"]
openai = ["openai>=1.30"]
dev = [
  "pytest>=8.0",
  "pytest-asyncio>=0.23",
  "pytest-cov>=5.0",
  "ruff>=0.4",
  "mypy>=1.10",
]

[project.urls]
Homepage = "https://github.com/cosmicdf/dtae"
Repository = "https://github.com/cosmicdf/dtae"
Issues = "https://github.com/cosmicdf/dtae/issues"

[tool.hatch.build.targets.wheel]
packages = ["dtae"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
disallow_untyped_defs = true
warn_return_any = false
no_implicit_reexport = false

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
