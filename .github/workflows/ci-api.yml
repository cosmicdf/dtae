name: CI - FastAPI Server

on:
  push:
    branches: [main, develop]
    paths:
      - "packages/api/**"
      - "packages/core/**"
      - ".github/workflows/ci-api.yml"
  pull_request:
    branches: [main]
    paths:
      - "packages/api/**"
  workflow_dispatch:

jobs:
  test:
    name: Test API (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    defaults:
      run:
        working-directory: packages/api

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install core dependency
        run: pip install ../core

      - name: Install API dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: python -m ruff check app

      - name: Run tests
        env:
          DTAE_DISABLE_EMBEDDINGS: "true"
        run: python -m pytest tests/ -v

  docker:
    name: Docker build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -f packages/api/Dockerfile -t dtae-api:ci .
