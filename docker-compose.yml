services:
  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    ports:
      - "8000:8000"
    environment:
      DTAE_QDRANT_URL: http://qdrant:6333
      DTAE_DEBUG: "false"
    depends_on:
      qdrant:
        condition: service_healthy
    restart: unless-stopped

  mcp:
    build:
      context: packages/mcp-server
      dockerfile: Dockerfile
    ports:
      - "3100:3100"
    environment:
      DTAE_REGISTRY_URL: http://api:8000
    depends_on:
      - api
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  qdrant_data:
